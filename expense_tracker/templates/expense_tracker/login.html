<style>
    .container-box {
        background-color: rgb(255, 246, 236);
        padding: 5px 20px;
        border-radius: 10px;
        max-width: 500px;
        width: 90%;
        margin: auto;
        
    }
    p{
        color: red;
    }
    .submit{
        background-color: green;
        color:aliceblue;
        border-color:green;
        width: 60%;
        align-items: center;
    }
    .submit a{
            color:aliceblue;
            text-decoration: none;
        }
    label {
         display: block;
        margin-top: 10px;
    }
    input {
        width: 90%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    
</style>

<head> 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<div class="container-box">
    <h1><center>Expense Tracker</center></h1>
    <h3><center>Login</center></h3>

<form method="POST" >
    {% csrf_token %}

    {% if error %}

    <div class="alert alert-danger" role="alert">
    {{ error }}
    </div>
    {% endif %}


    <label>Username:</label>
    <input type="text" name="username" placeholder="Enter your name" required><br><br>
    <label>Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter your password" required>
    <button type="button" onclick="togglePassword()">👁</button><br><br>
    

    <h6>Didn't join yet? <a href="{% url 'signup' %}">Join now</a></h6><br><br>

    <button type="submit" class="submit">Login</button>

</form>

<script>

function togglePassword() {

    let password =
        document.getElementById("password");

    if (password.type ==="password")

        { password.type ="text";}

    else {password.type ="password";}
}

</script>
</div>
